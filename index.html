<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Shift" />
  <meta name="theme-color" content="#ffffff" />
  <title>Shift Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f5f4f2; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #111; letter-spacing: 0.01em; -webkit-tap-highlight-color: transparent; }
    button { font-family: inherit; -webkit-appearance: none; }
    input, textarea { font-family: inherit; -webkit-appearance: none; border-radius: 0; }
    .shift-app { min-height: 100vh; min-height: -webkit-fill-available; background: #f5f4f2; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bot { padding-bottom: env(safe-area-inset-bottom); }
    .cal-day:hover { background: #ebebea !important; }
    .list-row:hover { background: #f0eeec !important; }
    .icon-btn:hover { opacity: 0.5; }
    .primary-btn:active { background: #333 !important; }
    .ghost-btn:active { background: #e8e6e4 !important; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #root { height: 100%; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Initial Data ─────────────────────────────────────────────
const MARCH_2026_DATA = {
  "2026-03-01": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-02": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-03": { status: "出勤", startTime: "10:00", endTime: "", memo: "" },
  "2026-03-04": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-05": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-06": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-07": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-08": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-09": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-10": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-11": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-12": { status: "出勤", startTime: "11:30", endTime: "", memo: "選番研修 / クレジット説明会" },
  "2026-03-13": { status: "出勤", startTime: "11:30", endTime: "", memo: "選番研修 / 店長会" },
  "2026-03-14": { status: "出勤", startTime: "11:00", endTime: "", memo: "選番研修" },
  "2026-03-15": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-16": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-17": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-18": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-19": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-20": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-21": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-22": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-23": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-24": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-25": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-26": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-27": { status: "休日", startTime: "", endTime: "", memo: "" },
  "2026-03-28": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-29": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-30": { status: "出勤", startTime: "09:30", endTime: "", memo: "" },
  "2026-03-31": { status: "休日", startTime: "", endTime: "", memo: "" },
};

const WEEKDAY_JP = ["日", "月", "火", "水", "木", "金", "土"];

// ── Helpers ──────────────────────────────────────────────────
function dateKey(y, m, d) {
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function calcHours(start, end) {
  if (!start || !end) return null;
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);
  const diff = (eh * 60 + em) - (sh * 60 + sm);
  return diff > 0 ? diff / 60 : null;
}
function formatHours(h) {
  const hours = Math.floor(h);
  const mins = Math.round((h - hours) * 60);
  return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
}

// ── Storage (localStorage) ────────────────────────────────────
const storage = {
  get: (key) => { try { return localStorage.getItem(key); } catch { return null; } },
  set: (key, val) => { try { localStorage.setItem(key, val); } catch {} },
};

// ── SVG Icons ────────────────────────────────────────────────
const IconCamera   = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
const IconChevronL = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
const IconChevronR = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
const IconClose    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const IconTrash    = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>;
const IconArrow    = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
const IconCheck    = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

// ── Main App ─────────────────────────────────────────────────
function ShiftManager() {
  const today = new Date();
  const [year, setYear]           = useState(today.getFullYear());
  const [month, setMonth]         = useState(today.getMonth() + 1);
  const [view, setView]           = useState("calendar");
  const [shifts, setShifts]       = useState({});
  const [editDay, setEditDay]     = useState(null);
  const [editData, setEditData]   = useState(null);
  const [loaded, setLoaded]       = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const storageKey = `shifts:${year}-${String(month).padStart(2,"0")}`;

  useEffect(() => {
    setLoaded(false);
    const raw = storage.get(storageKey);
    if (raw) {
      setShifts(JSON.parse(raw));
    } else if (year === 2026 && month === 3) {
      setShifts(MARCH_2026_DATA);
      storage.set(storageKey, JSON.stringify(MARCH_2026_DATA));
    } else {
      setShifts({});
    }
    setLoaded(true);
  }, [year, month]);

  const saveShifts = useCallback((s) => {
    setShifts(s);
    storage.set(storageKey, JSON.stringify(s));
  }, [storageKey]);

  const daysInMonth = new Date(year, month, 0).getDate();
  const firstDow    = new Date(year, month - 1, 1).getDay();

  const stats = (() => {
    let work = 0, off = 0, totalH = 0, hasTime = false;
    for (let d = 1; d <= daysInMonth; d++) {
      const s = shifts[dateKey(year, month, d)];
      if (!s) continue;
      if (s.status === "休日") off++;
      else { work++; const h = calcHours(s.startTime, s.endTime); if (h) { totalH += h; hasTime = true; } }
    }
    return { work, off, totalH: hasTime ? totalH : null };
  })();

  function openEdit(day) {
    const k = dateKey(year, month, day);
    setEditDay(day);
    setEditData(shifts[k] || { status: "出勤", startTime: "", endTime: "", memo: "" });
    setConfirmDelete(false);
  }
  function saveEdit() {
    saveShifts({ ...shifts, [dateKey(year, month, editDay)]: { ...editData } });
    setEditDay(null);
  }
  function deleteEntry() {
    const n = { ...shifts };
    delete n[dateKey(year, month, editDay)];
    saveShifts(n);
    setEditDay(null);
    setConfirmDelete(false);
  }
  const prevMonth = () => { if (month === 1) { setYear(y => y - 1); setMonth(12); } else setMonth(m => m - 1); };
  const nextMonth = () => { if (month === 12) { setYear(y => y + 1); setMonth(1); } else setMonth(m => m + 1); };
  const goToday   = () => { setYear(today.getFullYear()); setMonth(today.getMonth() + 1); };

  const todayY = today.getFullYear();
  const todayM = today.getMonth() + 1;
  const todayD = today.getDate();
  const isCurrentMonth = year === todayY && month === todayM;
  const todayShift = isCurrentMonth ? shifts[dateKey(todayY, todayM, todayD)] : null;

  const labelSm = { fontSize: 9, letterSpacing: 3, color: "#aaa", textTransform: "uppercase", marginBottom: 8, display: "block" };

  return (
    <div className="shift-app">
      {/* ── Header ─────────────────────────────────── */}
      <div style={{ background: "#fff", borderBottom: "1px solid #e0dedd" }} className="safe-top">
        <div style={{ padding: "16px 20px 0" }}>

          {/* Title row */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 9, letterSpacing: 4, color: "#999", textTransform: "uppercase", marginBottom: 4 }}>Shift Manager</div>
              <div style={{ fontSize: 22, fontWeight: 300, letterSpacing: 1 }}>成田</div>
              {/* Today's shift */}
              <div style={{ marginTop: 6, fontSize: 11, color: "#aaa", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#ccc" }}>Today</span>
                {todayShift
                  ? todayShift.status === "休日"
                    ? <span style={{ color: "#ccc", letterSpacing: 1 }}>Off</span>
                    : <span style={{ color: "#111", fontWeight: 400 }}>
                        {todayShift.startTime || "—"}{todayShift.endTime ? ` – ${todayShift.endTime}` : ""}
                        {todayShift.memo ? <span style={{ color: "#bbb", fontSize: 10, marginLeft: 6 }}>{todayShift.memo}</span> : null}
                      </span>
                  : <span style={{ color: "#ddd" }}>—</span>
                }
              </div>
            </div>
            <button onClick={() => setShowImport(true)} className="icon-btn" style={{
              display: "flex", alignItems: "center", gap: 6, background: "none",
              border: "1px solid #111", padding: "6px 12px", cursor: "pointer",
              fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: "#111", marginTop: 4
            }}>
              <IconCamera /> Scan
            </button>
          </div>

          {/* Month nav */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <button onClick={prevMonth} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#111", padding: 4 }}><IconChevronL /></button>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 400, letterSpacing: 2, textTransform: "uppercase" }}>{year} / {String(month).padStart(2,"0")}</span>
              {!isCurrentMonth && (
                <button onClick={goToday} style={{
                  background: "none", border: "1px solid #ddd", padding: "2px 8px", cursor: "pointer",
                  fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", color: "#aaa"
                }}>Today</button>
              )}
            </div>
            <button onClick={nextMonth} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#111", padding: 4 }}><IconChevronR /></button>
          </div>

          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", borderTop: "1px solid #e0dedd" }}>
            {[["WORK", stats.work], ["OFF", stats.off], ["HOURS", stats.totalH !== null ? formatHours(stats.totalH) : "—"]].map(([label, value], i) => (
              <div key={i} style={{ padding: "12px 0", textAlign: "center", borderRight: i < 2 ? "1px solid #e0dedd" : "none" }}>
                <div style={{ fontSize: 8, letterSpacing: 3, color: "#aaa", textTransform: "uppercase", marginBottom: 3 }}>{label}</div>
                <div style={{ fontSize: 17, fontWeight: 300 }}>{value}</div>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", borderTop: "1px solid #e0dedd" }}>
            {["calendar", "list"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                flex: 1, padding: "10px 0", background: "none", border: "none", cursor: "pointer",
                fontSize: 9, letterSpacing: 3, textTransform: "uppercase",
                color: view === v ? "#111" : "#bbb",
                borderBottom: view === v ? "1.5px solid #111" : "1.5px solid transparent",
                transition: "all 0.2s"
              }}>{v === "calendar" ? "Calendar" : "List"}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Content ────────────────────────────────── */}
      <div style={{ padding: "20px 16px" }} className="safe-bot">
        {!loaded
          ? <div style={{ textAlign: "center", padding: 60, fontSize: 11, letterSpacing: 2, color: "#bbb", textTransform: "uppercase" }}>Loading</div>
          : view === "calendar"
            ? <CalendarView year={year} month={month} daysInMonth={daysInMonth} firstDow={firstDow} shifts={shifts} onDayClick={openEdit} />
            : <ListView year={year} month={month} daysInMonth={daysInMonth} shifts={shifts} onDayClick={openEdit} />
        }
      </div>

      {/* ── Edit Modal ─────────────────────────────── */}
      {editDay && editData && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100 }}
          onClick={() => { setEditDay(null); setConfirmDelete(false); }}>
          <div style={{ background: "#fff", width: "100%", maxWidth: 480, padding: "28px 24px 40px" }} onClick={e => e.stopPropagation()}>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
              <div>
                <div style={{ fontSize: 9, letterSpacing: 3, color: "#aaa", textTransform: "uppercase", marginBottom: 4 }}>{year} / {String(month).padStart(2,"0")}</div>
                <div style={{ fontSize: 24, fontWeight: 300, letterSpacing: 0.5 }}>{editDay} {WEEKDAY_JP[new Date(year, month - 1, editDay).getDay()]}</div>
              </div>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                {shifts[dateKey(year, month, editDay)] && !confirmDelete && (
                  <button onClick={() => setConfirmDelete(true)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#c0392b", padding: 4 }}><IconTrash /></button>
                )}
                <button onClick={() => { setEditDay(null); setConfirmDelete(false); }} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#111", padding: 4 }}><IconClose /></button>
              </div>
            </div>

            {confirmDelete ? (
              <div>
                <div style={{ fontSize: 12, color: "#666", marginBottom: 20, lineHeight: 1.7 }}>{month}/{editDay} のデータを削除しますか？<br />この操作は取り消せません。</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setConfirmDelete(false)} className="ghost-btn" style={{ flex: 1, padding: "12px 0", background: "#f5f4f2", border: "none", cursor: "pointer", fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#666" }}>Cancel</button>
                  <button onClick={deleteEntry} style={{ flex: 2, padding: "12px 0", background: "#c0392b", border: "none", cursor: "pointer", fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#fff" }}>Delete</button>
                </div>
              </div>
            ) : (
              <>
                <div style={{ marginBottom: 20 }}>
                  <label style={labelSm}>Status</label>
                  <div style={{ display: "flex", border: "1px solid #e0dedd" }}>
                    {["出勤", "休日"].map((s, i) => (
                      <button key={s} onClick={() => setEditData({ ...editData, status: s })} style={{
                        flex: 1, padding: "10px 0", background: editData.status === s ? "#111" : "#fff",
                        border: "none", borderRight: i === 0 ? "1px solid #e0dedd" : "none",
                        cursor: "pointer", fontSize: 11, letterSpacing: 2, textTransform: "uppercase",
                        color: editData.status === s ? "#fff" : "#aaa", transition: "all 0.15s"
                      }}>{s}</button>
                    ))}
                  </div>
                </div>

                {editData.status === "出勤" && (
                  <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
                    {[["開始", "startTime"], ["終了", "endTime"]].map(([label, key]) => (
                      <div key={key} style={{ flex: 1 }}>
                        <label style={labelSm}>{label}</label>
                        <input type="time" value={editData[key]} onChange={e => setEditData({ ...editData, [key]: e.target.value })}
                          style={{ width: "100%", padding: "10px 12px", border: "1px solid #e0dedd", fontSize: 15, fontWeight: 300, background: "#fafaf9", outline: "none" }} />
                      </div>
                    ))}
                  </div>
                )}

                {editData.status === "出勤" && editData.startTime && editData.endTime && (() => {
                  const h = calcHours(editData.startTime, editData.endTime);
                  return h ? (
                    <div style={{ display: "flex", alignItems: "center", marginBottom: 20, padding: "10px 12px", background: "#f5f4f2", borderLeft: "2px solid #111" }}>
                      <span style={{ fontSize: 9, letterSpacing: 3, color: "#999", textTransform: "uppercase" }}>Duration</span>
                      <span style={{ fontSize: 14, fontWeight: 300, marginLeft: "auto" }}>{formatHours(h)}</span>
                    </div>
                  ) : null;
                })()}

                <div style={{ marginBottom: 24 }}>
                  <label style={labelSm}>Memo</label>
                  <textarea value={editData.memo} onChange={e => setEditData({ ...editData, memo: e.target.value })}
                    placeholder="Add a note..." rows={2}
                    style={{ width: "100%", padding: "10px 12px", border: "1px solid #e0dedd", fontSize: 13, resize: "none", background: "#fafaf9", outline: "none", fontWeight: 300, color: "#333", lineHeight: 1.6 }} />
                </div>

                <button onClick={saveEdit} className="primary-btn" style={{ width: "100%", padding: "13px 0", background: "#111", color: "#fff", border: "none", cursor: "pointer", fontSize: 10, letterSpacing: 3, textTransform: "uppercase" }}>Save</button>
              </>
            )}
          </div>
        </div>
      )}

      {showImport && <ImportModal onClose={() => setShowImport(false)} />}
    </div>
  );
}

// ── Import Modal ─────────────────────────────────────────────
function ImportModal({ onClose }) {
  const [copied, setCopied] = useState(false);
  const prompt = `シフト表のスクショを添付します。「成田」の列を読み取って、Googleカレンダーに追加してください。`;

  useEffect(() => {
    navigator.clipboard.writeText(prompt).catch(() => {}).finally(() => setCopied(true));
  }, []);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 200 }} onClick={onClose}>
      <div style={{ background: "#fff", width: "100%", maxWidth: 480, padding: "28px 24px 44px" }} onClick={e => e.stopPropagation()}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: 4, color: "#aaa", textTransform: "uppercase", marginBottom: 4 }}>Scan</div>
            <div style={{ fontSize: 20, fontWeight: 300 }}>Import Shift</div>
          </div>
          <button onClick={onClose} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#111", padding: 4 }}><IconClose /></button>
        </div>

        <div style={{
          padding: "14px 16px", marginBottom: 24,
          background: copied ? "#f5f4f2" : "#fafaf9",
          borderLeft: `2px solid ${copied ? "#111" : "#ddd"}`,
          transition: "all 0.3s"
        }}>
          <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: copied ? "#111" : "#bbb", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
            {copied && <IconCheck />} {copied ? "Prompt Copied!" : "Copying..."}
          </div>
          <div style={{ fontSize: 12, color: "#777", lineHeight: 1.7, fontFamily: "monospace" }}>{prompt}</div>
        </div>

        {["スクショを撮る", "Claudeのチャット画面へ移動", "画像を添付 → 貼り付けて送信"].map((s, i) => (
          <div key={i} style={{ display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 14 }}>
            <div style={{ fontSize: 10, letterSpacing: 1, color: "#bbb", minWidth: 20 }}>0{i+1}</div>
            <div style={{ flex: 1, height: 1, background: "#e0dedd", marginTop: 8, maxWidth: 16 }} />
            <div style={{ flex: 1, fontSize: 13, fontWeight: 300, color: "#444", lineHeight: 1.6 }}>{s}</div>
          </div>
        ))}

        <button onClick={onClose} className="primary-btn" style={{
          width: "100%", marginTop: 8, padding: "13px 0", background: "#111", color: "#fff",
          border: "none", cursor: "pointer", fontSize: 10, letterSpacing: 3, textTransform: "uppercase"
        }}>Close</button>
      </div>
    </div>
  );
}

// ── Calendar View ────────────────────────────────────────────
function CalendarView({ year, month, daysInMonth, firstDow, shifts, onDayClick }) {
  const today = new Date();
  const todayY = today.getFullYear();
  const todayM = today.getMonth() + 1;
  const todayD = today.getDate();

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div style={{ background: "#fff", padding: "16px 12px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", marginBottom: 8 }}>
        {WEEKDAY_JP.map((d, i) => (
          <div key={d} style={{ textAlign: "center", fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: i === 0 ? "#c0392b" : i === 6 ? "#555" : "#bbb", padding: "4px 0" }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={i} />;
          const dow = (firstDow + day - 1) % 7;
          const k = dateKey(year, month, day);
          const data = shifts[k];
          const isOff = data?.status === "休日";
          const isToday = year === todayY && month === todayM && day === todayD;
          return (
            <button key={i} onClick={() => onDayClick(day)} className="cal-day" style={{
              border: "none", padding: "8px 4px 10px", cursor: "pointer",
              background: isToday ? "#f0f0ef" : !data ? "transparent" : isOff ? "#f5f4f2" : "#fff",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minHeight: 60,
              borderTop: isToday ? "2px solid #111" : isOff ? "2px solid #ddd" : data ? "2px solid #111" : "2px solid #eee",
              outline: isToday ? "none" : "none",
              transition: "background 0.15s",
              position: "relative"
            }}>
              <span style={{
                fontSize: 13, fontWeight: isToday ? 600 : 300,
                color: isToday ? "#111" : !data ? "#ccc" : isOff ? "#ccc" : dow === 0 ? "#c0392b" : "#111"
              }}>{day}</span>
              {isToday && <span style={{ position: "absolute", bottom: 4, width: 4, height: 4, background: "#111", borderRadius: "50%" }} />}
              {data && !isOff && <span style={{ fontSize: 10, color: "#888", fontWeight: 300 }}>{data.startTime}</span>}
              {data && !isOff && data.endTime && <span style={{ fontSize: 9, color: "#bbb" }}>{data.endTime}</span>}
              {isOff && <span style={{ fontSize: 8, letterSpacing: 1.5, color: "#ccc", textTransform: "uppercase" }}>Off</span>}
              {data?.memo && !isOff && <span style={{ width: 3, height: 3, background: "#111", borderRadius: "50%" }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── List View ────────────────────────────────────────────────
function ListView({ year, month, daysInMonth, shifts, onDayClick }) {
  return (
    <div style={{ background: "#fff" }}>
      {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
        const dow = new Date(year, month - 1, day).getDay();
        const k = dateKey(year, month, day);
        const data = shifts[k];
        const isOff = data?.status === "休日";
        const hours = data && !isOff ? calcHours(data.startTime, data.endTime) : null;
        return (
          <button key={day} onClick={() => onDayClick(day)} className="list-row" style={{
            display: "flex", alignItems: "center", background: "transparent", border: "none",
            borderBottom: "1px solid #f0eeec", padding: "12px 16px", cursor: "pointer", gap: 16,
            width: "100%", textAlign: "left", transition: "background 0.1s"
          }}>
            <div style={{ width: 48, flexShrink: 0, display: "flex", alignItems: "baseline", gap: 4 }}>
              <span style={{ fontSize: 17, fontWeight: 300, color: dow === 0 ? "#c0392b" : "#111" }}>{day}</span>
              <span style={{ fontSize: 9, letterSpacing: 1, color: dow === 0 ? "#c0392b" : "#bbb", textTransform: "uppercase" }}>{WEEKDAY_JP[dow]}</span>
            </div>
            <div style={{ flex: 1 }}>
              {!data
                ? <span style={{ fontSize: 11, color: "#ddd" }}>—</span>
                : isOff
                  ? <span style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#bbb" }}>Off</span>
                  : <div>
                      <span style={{ fontSize: 13, fontWeight: 300, color: "#333" }}>{data.startTime || "—"}{data.endTime ? ` – ${data.endTime}` : ""}</span>
                      {hours && <span style={{ fontSize: 10, color: "#bbb", marginLeft: 10, letterSpacing: 1 }}>{formatHours(hours)}</span>}
                      {data.memo && <div style={{ fontSize: 10, color: "#bbb", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{data.memo}</div>}
                    </div>
              }
            </div>
            <span style={{ color: "#ddd" }}><IconArrow /></span>
          </button>
        );
      })}
    </div>
  );
}

// ── Mount ────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ShiftManager />);
</script>
</body>
</html>
